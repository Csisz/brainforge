name: CI

# Runs every gate on push and PR to main. The DB-backed suites (test:rls,
# flow:test) run against a REAL Supabase stack started here — no gate can be
# silently skipped, and a failure of any step fails the workflow. The build step
# needs no network access (fonts are self-hosted, Stability B4).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates (lint · typecheck · test · verify · test:rls · flow:test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # Node 22 (matches local dev / @types/node): `npm test` uses node --test
          # with a glob pattern, which needs Node ≥ 21.
          node-version: "22"
          cache: npm # caches ~/.npm; `npm ci` restores from it (recommended over caching node_modules)

      - name: Install dependencies
        run: npm ci

      # ── Fast, DB-free gates first, for quick feedback ─────────────────────
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Worksheet golden verify
        run: npm run verify

      # ── Real Postgres + Auth + PostgREST for the DB-backed suites ─────────
      # flow:test and test:rls need a real Supabase stack (auth signups, RLS,
      # security-definer RPCs), not just a bare Postgres. The CLI applies every
      # migration in supabase/migrations on start.
      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.101.0

      - name: Start Supabase (applies migrations)
        run: supabase start

      - name: Capture local Supabase env
        # Keys are generated fresh by the local stack, so nothing secret is
        # committed. Mirror .env.local: the app reads the new-format publishable /
        # secret keys (falling back to the legacy JWT keys on older CLIs). Written
        # to BOTH a real .env.local file — the test scripts run via
        # `tsx --env-file=.env.local`, which errors if the file is missing, and
        # `next build` auto-loads it — and $GITHUB_ENV, for the shell step below.
        run: |
          status="$(supabase status -o json)"
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=$(echo "$status" | jq -r '.API_URL')"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$(echo "$status" | jq -r '.PUBLISHABLE_KEY // .ANON_KEY')"
            echo "SUPABASE_SERVICE_ROLE_KEY=$(echo "$status" | jq -r '.SECRET_KEY // .SERVICE_ROLE_KEY')"
            echo "NEXT_PUBLIC_APP_URL=http://localhost:3000"
          } | tee .env.local >> "$GITHUB_ENV"

      - name: Wait for Auth + REST to be ready
        # `supabase start` returns when containers are healthy, but a freshly
        # started GoTrue can still be warming up. The DB suites hit it immediately
        # with signups, so block until auth health and PostgREST both respond.
        run: |
          for i in $(seq 1 60); do
            auth=$(curl -s -o /dev/null -w "%{http_code}" "$NEXT_PUBLIC_SUPABASE_URL/auth/v1/health" || echo 000)
            rest=$(curl -s -o /dev/null -w "%{http_code}" -H "apikey: $NEXT_PUBLIC_SUPABASE_ANON_KEY" "$NEXT_PUBLIC_SUPABASE_URL/rest/v1/" || echo 000)
            echo "attempt $i: auth=$auth rest=$rest"
            [ "$auth" = "200" ] && { [ "$rest" = "200" ] || [ "$rest" = "404" ]; } && { echo "Supabase ready"; exit 0; }
            sleep 2
          done
          echo "Supabase did not become ready in time"; exit 1

      # ── Security regression gate — MUST run and MUST pass ─────────────────
      - name: RLS attack matrix (test:rls)
        run: npm run test:rls

      - name: End-to-end flow test (flow:test)
        run: |
          set -o pipefail
          npm run flow:test 2>&1 | tee /tmp/flow.log

      # ── TEMP B4 diagnostics: localize a flow:test failure via step conclusions
      - name: "diag: reached §8 quota"
        if: always()
        run: grep -q "8. generation quota" /tmp/flow.log
      - name: "diag: reached §9 stripe"
        if: always()
        run: grep -q "9. stripe webhook" /tmp/flow.log
      - name: "diag: reached §10 B1 lifecycle"
        if: always()
        run: grep -q "10. atomic lifecycle" /tmp/flow.log
      - name: "diag: reached §12 account deletion"
        if: always()
        run: grep -q "12. account deletion" /tmp/flow.log
      - name: "diag: no uncaught throw"
        if: always()
        run: "! grep -q 'flow test threw' /tmp/flow.log"
      - name: "diag: no FAIL lines"
        if: always()
        run: "! grep -q ' FAIL ' /tmp/flow.log"
      - name: "diag: reached ALL CHECKS PASSED"
        if: always()
        run: grep -q "ALL CHECKS PASSED" /tmp/flow.log
      - name: "diag: dump FAIL/throw lines"
        if: always()
        run: grep -nE ' FAIL |threw|Error' /tmp/flow.log || echo "(no FAIL/throw/Error lines)"

      # ── Production build — self-hosted fonts, no network needed ───────────
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
